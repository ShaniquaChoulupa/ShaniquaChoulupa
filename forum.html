<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Chalkboard Studio - Forum</title>
<style>
    /* ... [Keep all existing CSS from your provided code] ... */
    
    /* ADDED: Mobile Override Support */
    body.layout-mobile { padding: 15px; }
    body.layout-mobile .studio-wall { grid-template-columns: 1fr !important; }
    body.layout-mobile .controls-wrapper { flex-direction: column; }
    body.layout-mobile .forward-nav-btn { padding: 15px; font-size: 1.2em; width: 100%; text-align: center; }
</style>
</head>
<body class="theme-skeuo">

    <!-- Top Action Control Toolbar Alignment System -->
    <div class="controls-wrapper">
        <div class="nav-buttons">
            <a href="index.html" class="forward-nav-btn" id="back-btn" title="Back to Home">← Home</a>
        </div>
         
        <div class="left-controls">
            <!-- Layout Switcher (Integrated) -->
            <div class="menu-container">
                <span class="menu-label">Layout:</span>
                <select class="menu-select" id="layout-picker" onchange="changeLayout(this.value)">
                    <option value="layout-auto">Auto</option>
                    <option value="layout-desktop">Desktop</option>
                    <option value="layout-mobile">Mobile</option>
                </select>
            </div>

            <div class="menu-container">
                <span class="menu-label">Theme:</span>
                <select class="menu-select" id="theme-picker" onchange="changeTheme(this.value)">
                    <option value="theme-skeuo">Skeuomorphic</option>
                    <option value="theme-cyber">Cyber Neon / Glass</option>
                    <option value="theme-pastel">Classic Pastel Rainbow</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Main Content Wall Matrix -->
    <div class="studio-wall">
        <!-- ... [Keep your existing forum boards here] ... -->
    </div>

    <script>
        // 1. Theme Logic
        function changeTheme(themeName) {
            document.body.classList.remove('theme-skeuo', 'theme-cyber', 'theme-pastel');
            document.body.classList.add(themeName);
            localStorage.setItem('savedTheme', themeName);
            document.getElementById('theme-picker').value = themeName;
        }

        // 2. Layout Logic (Added for cross-page persistence)
        function changeLayout(layoutName) {
            if (layoutName === 'layout-mobile') {
                document.body.classList.add('layout-mobile');
            } else {
                document.body.classList.remove('layout-mobile');
            }
            localStorage.setItem('savedLayout', layoutName);
            document.getElementById('layout-picker').value = layoutName;
        }

        // 3. Memory Recall System
        window.onload = function() {
            const savedLayout = localStorage.getItem('savedLayout') || 'layout-auto';
            const savedTheme = localStorage.getItem('savedTheme') || 'theme-skeuo';
            
            changeLayout(savedLayout);
            changeTheme(savedTheme);
        };

        // ... [Keep your openForum/closeForum functions] ...
    </script>
</body>
</html>
