<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Chalkboard Studio - Forum</title>
<style>
    /* ==========================================
       1. GLOBAL BASE STYLES & LAYOUT
       ========================================== */
    body { margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; transition: background 0.5s ease, color 0.5s ease; }
    .controls-wrapper { width: 100%; max-width: 1300px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 15px; }
    .left-controls { display: flex; gap: 15px; }
    .nav-buttons { display: flex; gap: 10px; }
    .menu-container { padding: 8px 16px; border-radius: 6px; display: flex; align-items: center; gap: 10px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.15); transition: all 0.3s ease; }
    .menu-label { font-weight: bold; font-size: 0.95em; }
    .menu-select { padding: 4px 8px; border-radius: 4px; font-size: 0.9em; cursor: pointer; outline: none; }
    .forward-nav-btn { padding: 8px 20px; border-radius: 6px; text-decoration: none; font-weight: bold; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.15); transition: all 0.3s ease; cursor: pointer; }
    .forward-nav-btn:hover { transform: scale(1.05); }

    /* Responsive Studio Wall Matrix Framework */
    .studio-wall { width: 100%; max-width: 1300px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
    /* Override for Manual Layout Persistence */
    body.layout-mobile .studio-wall { grid-template-columns: 1fr !important; }
    body.layout-desktop .studio-wall { grid-template-columns: repeat(3, 1fr) !important; }
    @media (max-width: 1024px) { .studio-wall { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) { .studio-wall { grid-template-columns: 1fr; } }

    /* ==========================================
       2. ZOOMING & SCROLLING CHALKBOARD FORUM
       ========================================== */
    .chalkboard-card { padding: 0; background: none; border: none; width: 100%; cursor: pointer; outline: none; box-sizing: border-box; }
    .chalkboard { padding: 30px; border-radius: 8px; min-height: 220px; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); box-sizing: border-box; position: relative; overflow: hidden; }
    .chalkboard-card:hover .chalkboard { transform: translateY(-5px) scale(1.02); }
    .forum-title { margin: 0; font-size: 1.8em; letter-spacing: 0.5px; text-align: center; line-height: 1.3; }
    .forum-content-view { display: none; opacity: 0; text-align: center; transition: opacity 0.3s ease; width: 100%; max-width: 900px; margin-top: 25px; box-sizing: border-box; }
    .forum-text p { font-size: 1.25em; line-height: 1.65; margin: 0 0 22px 0; text-align: left; }
    .forum-close-x { display: none; position: fixed; top: 25px; right: 45px; font-size: 2.5em; font-weight: bold; background: none; border: none; color: inherit; cursor: pointer; line-height: 1; padding: 5px 10px; z-index: 10005; }
    .media-embed-container { width: 100%; max-width: 640px; margin: 35px auto 15px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border-radius: 8px; overflow: hidden; background: #000; }
    .media-aspect-ratio { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
    .media-aspect-ratio iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
    .chalkboard.fullscreen-zoom { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9999; border-radius: 0 !important; margin: 0; padding: 60px 40px; justify-content: flex-start; align-items: center; transform: none !important; cursor: default; overflow-y: auto; }
    .chalkboard.fullscreen-zoom .forum-content-view { display: block; opacity: 1; }
    .chalkboard.fullscreen-zoom .forum-close-x { display: block; }
    body.modal-open { overflow: hidden; }

    /* ==========================================
       3. THEME VARIATIONS
       ========================================== */
    body.theme-skeuo { background-color: #2e3138; color: #fff; }
    body.theme-pastel { background: #2b3a32; color: #ffeb99; }
    body.theme-cyber { background: #0f172a; color: #f8fafc; }
    /* Note: Add original theme gradients back here as needed */
</style>
</head>
<body class="theme-skeuo">

    <div class="controls-wrapper">
        <div class="nav-buttons">
            <a href="index.html" class="forward-nav-btn">← Home</a>
        </div>
        <div class="left-controls">
            <div class="menu-container">
                <span class="menu-label">Layout:</span>
                <select class="menu-select" id="layout-picker" onchange="applyLayout(this.value)">
                    <option value="layout-auto">Auto</option>
                    <option value="layout-desktop">Desktop</option>
                    <option value="layout-mobile">Mobile</option>
                </select>
            </div>
            <div class="menu-container">
                <span class="menu-label">Theme:</span>
                <select class="menu-select" id="theme-picker" onchange="applyTheme(this.value)">
                    <option value="theme-skeuo">Skeuomorphic</option>
                    <option value="theme-cyber">Cyber</option>
                    <option value="theme-pastel">Pastel</option>
                </select>
            </div>
        </div>
    </div>

    <div class="studio-wall">
        <div class="chalkboard-card" onclick="openForum(this, event)">
            <div class="chalkboard">
                <button class="forum-close-x" onclick="closeForum(this, event)">×</button>
                <h2 class="forum-title">Ulterior Motives</h2>
                <div class="forum-content-view"><div class="forum-text"><p>Content...</p></div></div>
            </div>
        </div>
    </div>

    <script>
        function applyTheme(theme) {
            document.body.className = theme;
            localStorage.setItem('savedTheme', theme);
            document.getElementById('theme-picker').value = theme;
        }

        function applyLayout(layout) {
            document.body.classList.remove('layout-desktop', 'layout-mobile');
            if (layout !== 'layout-auto') document.body.classList.add(layout);
            localStorage.setItem('savedLayout', layout);
            document.getElementById('layout-picker').value = layout;
        }

        function openForum(card, e) {
            const board = card.querySelector('.chalkboard');
            board.classList.add('fullscreen-zoom');
            document.body.classList.add('modal-open');
        }

        function closeForum(btn, e) {
            e.stopPropagation();
            btn.closest('.chalkboard').classList.remove('fullscreen-zoom');
            document.body.classList.remove('modal-open');
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('savedTheme') || 'theme-skeuo';
            const savedLayout = localStorage.getItem('savedLayout') || 'layout-auto';
            applyTheme(savedTheme);
            applyLayout(savedLayout);
        };
    </script>
</body>
</html>
