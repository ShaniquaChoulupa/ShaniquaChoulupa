<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Chalkboard Studio</title>
<style>
    /* ==========================================
       1. GLOBAL BASE STYLES & LAYOUT (Common to All)
       ========================================== */
    body {
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
        transition: background 0.3s ease, color 0.3s ease;
    }

    .controls-wrapper {
        width: 100%;
        max-width: 1300px;
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-bottom: 25px;
    }

    .menu-container {
        padding: 8px 16px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }

    .menu-label { font-weight: bold; font-size: 0.95em; }
    .menu-select { padding: 4px 8px; border-radius: 4px; font-size: 0.9em; cursor: pointer; outline: none; }

    .studio-wall {
        width: 100%;
        max-width: 1300px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 30px; 
    }

    .welcome-card, .bottom-spanner { grid-column: span 3; }

    @media (max-width: 1024px) {
        .studio-wall { grid-template-columns: repeat(2, 1fr); }
        .welcome-card, .bottom-spanner { grid-column: span 2; }
    }
    @media (max-width: 768px) {
        .studio-wall { grid-template-columns: 1fr; }
        .welcome-card, .bottom-spanner { grid-column: span 1; }
    }

    .chalkboard {
        padding: 25px;
        border-radius: 8px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: all 0.3s ease;
    }

    h1, h2 { text-align: center; margin-top: 0; letter-spacing: 0.5px; }
    p { font-size: 1.15em; line-height: 1.5; text-align: center; }
    .board-list { display: flex; flex-direction: column; gap: 16px; width: 100%; margin-top: 10px; }
    .board-item { display: flex; align-items: center; padding: 12px 18px; border-radius: 8px; transition: all 0.3s ease; }
    
    .wood-frame {
        width: 55px; height: 55px; border-radius: 10px; overflow: hidden;
        margin-right: 15px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;
    }
    .wood-frame img { width: 100%; height: 100%; object-fit: cover; }
    .chalk-link { font-size: 1.4em; text-decoration: none; font-weight: bold; }
    .goal-item { margin: 8px 0; font-size: 1.1em; font-weight: bold; }

    /* ==========================================
       2. THEME DEFINITIONS (Enforced via body classes)
       ========================================== */

    /* ----- THEME: SKEUOMORPHIC iOS 6 ----- */
    body.theme-ios6 {
        background-color: #2e3138;
        background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0), radial-gradient(rgba(0,0,0,0.3) 1px, transparent 0);
        background-size: 4px 4px; background-position: 0 0, 2px 2px;
        font-family: 'Marker Felt', 'Chalkboard SE', sans-serif;
        color: #fff;
    }
    .theme-ios6 .menu-container { background: linear-gradient(to bottom, #f2f2f2 0%, #ebebeb 50%, #dddddd 50%, #cfcfcf 100%); border: 1px solid #a6a6a6; }
    .theme-ios6 .menu-label { color: #4c566c; text-shadow: 0 1px 0 #fff; }
    .theme-ios6 .chalkboard {
        background: radial-gradient(circle at 50% 30%, #2f4f3e, #1b3327);
        border: 14px solid #4a2711;
        border-image: repeating-linear-gradient(45deg, #3d1f0d, #542d15 15px, #3d1f0d 30px) 14 stretch;
        text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.8);
        box-shadow: inset 0px 0px 15px rgba(0,0,0,0.6), 0 8px 16px rgba(0, 0, 0, 0.5);
    }
    .theme-ios6 h1 { color: #fff; }
    .theme-ios6 h2 { color: #ffe699; }
    .theme-ios6 .board-item { background: rgba(0, 0, 0, 0.15); border: 1px dashed rgba(255, 255, 255, 0.1); box-shadow: inset 0 2px 4px rgba(0,0,0,0.4); }
    .theme-ios6 .wood-frame { border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.5); background-color: #111; }
    .theme-ios6 .x-link { color: #99ccff; }
    .theme-ios6 .yt-link { color: #ff9999; }
    .theme-ios6 .tt-link { color: #b3ffec; }
    .theme-ios6 .granny-link { color: #ffb3ff; }
    
    /* Specific Notepad layout for iOS6 */
    .theme-ios6 .notepad-card {
        background: #fbf6d9;
        background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 0);
        background-size: 100% 28px;
        border: 1px solid #e3dbb3; border-radius: 6px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.25);
        color: #1a2332; padding: 30px 25px 25px 45px;
        font-family: 'Noteworthy', 'Helvetica Neue', sans-serif;
        position: relative;
    }
    .theme-ios6 .notepad-card::before { content: ''; position: absolute; top: 0; bottom: 0; left: 35px; width: 1px; border-left: 1px solid #ff9999; }
    .theme-ios6 .notepad-card h2 { color: #3b5998; border-bottom: 2px solid #3b5998; padding-bottom: 5px; text-shadow: none; }
    .theme-ios6 .notepad-card .goal-item { line-height: 28px; margin: 0; color: #2b3e56; text-align: left; }

    /* ----- THEME: CYBER NEON ----- */
    body.theme-cyber {
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #0f172a);
        background-size: 400% 400%; animation: cyberPulse 12s ease infinite;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #f8fafc;
    }
    .theme-cyber .menu-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); }
    .theme-cyber .menu-label { color: #94a3b8; }
    .theme-cyber .menu-select { background: #0f172a; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .theme-cyber .chalkboard, .theme-cyber .notepad-card {
        background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        text-shadow: none;
    }
    .theme-cyber .notepad-card::before { display: none; } /* Remove red lines if any */
    .theme-cyber h1 { background: linear-gradient(to right, #ffffff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .theme-cyber h2 { background: linear-gradient(to right, #fef08a, #fde047); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border: none; padding: 0; }
    .theme-cyber p { color: #94a3b8; }
    .theme-cyber .board-item { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
    .theme-cyber .wood-frame { background-color: #0f172a; border: 1px solid rgba(255, 255, 255, 0.1); }
    .theme-cyber .x-link { color: #38bdf8; }
    .theme-cyber .yt-link { color: #f87171; }
    .theme-cyber .tt-link { color: #2dd4bf; }
    .theme-cyber .granny-link { color: #e879f9; }
    .theme-cyber .goal-item { text-align: left; padding: 12px 16px; background: rgba(255, 255, 255, 0.02); border-left: 4px solid #64748b; border-radius: 0 12px 12px 0; color: #cbd5e1; }

    /* ----- THEME: CLASSIC PASTEL RAINBOW ----- */
    body.theme-pastel {
        background: linear-gradient(45deg, #FFB3BA, #FFDFBA, #FFFFBA, #BAFFC9, #BAE1FF, #D0BAFF, #FFB3BA);
        background-size: 400% 400%; animation: rainbowFade 16s ease infinite;
        font-family: 'Comic Sans MS', cursive, sans-serif; color: rgba(245, 245, 245, 0.95);
    }
    .theme-pastel .menu-container { background: #2b3a32; border: 3px solid #5c2c16; }
    .theme-pastel .menu-label { color: #ffe699; }
    .theme-pastel .chalkboard, .theme-pastel .notepad-card {
        background: radial-gradient(circle at 50% 30%, #374b41, #232d28);
        border: 14px solid #5c2c16; border-radius: 8px; padding: 25px;
        box-shadow: inset 0px 0px 20px rgba(0,0,0,0.7), 6px 8px 15px rgba(0,0,0,0.3);
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6); color: rgba(255, 255, 255, 0.95);
    }
    .theme-pastel .notepad-card::before { display: none; }
    .theme-pastel h1 { color: #fff; }
    .theme-pastel h2 { color: #ffe699; border: none; padding: 0; }
    .theme-pastel p { color: rgba(245, 245, 245, 0.85); text-align: center; }
    .theme-pastel .board-item { background: rgba(255, 255, 255, 0.04); border: 1px dashed rgba(255, 255, 255, 0.15); border-radius: 8px; }
    .theme-pastel .wood-frame { border: 3px solid #5c2c16; background-color: #222; }
    .theme-pastel .x-link { color: #99ccff; }
    .theme-pastel .yt-link { color: #ff9999; }
    .theme-pastel .tt-link { color: #b3ffec; }
    .theme-pastel .granny-link { color: #ffb3ff; }
    .theme-pastel .goal-item { text-align: center; color: #ffeb99; border: none; background: none; padding: 0; }
</style>
</head>
