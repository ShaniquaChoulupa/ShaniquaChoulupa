<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Chalkboard Studio - Khouzam</title>
<style>
    /* ==========================================
       1. GLOBAL BASE STYLES & LAYOUT
       ========================================== */
    body {
        margin: 0;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        box-sizing: border-box;
        transition: background 0.5s ease, color 0.5s ease;
    }

    /* Container for the chalkboard layout */
    .studio-wall {
        width: 100%;
        max-width: 750px;
        display: flex;
        flex-direction: column;
        gap: 40px; 
    }

    /* Controls top bar alignment for theme/lang picks */
    .controls-wrapper {
        width: 100%;
        max-width: 750px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        gap: 15px;
    }

    .left-controls {
        display: flex;
        gap: 15px;
    }

    /* Dropdown Selector Layout Containers */
    .menu-container {
        padding: 8px 16px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
    }

    .menu-label {
        font-weight: bold;
        font-size: 0.95em;
    }

    .menu-select {
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.9em;
        cursor: pointer;
        outline: none;
    }

    /* Interactive Back Button Structure */
    .back-nav-btn {
        padding: 8px 20px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: bold;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        transition: all 0.3s ease;
    }
    .back-nav-btn:hover {
        transform: scale(1.05);
    }

    /* Ultra-Realistic Chalkboard and Framing Wrapper */
    .chalkboard {
        padding: 30px;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
    }

    h2 {
        text-align: center;
        margin-top: 0;
        letter-spacing: 1px;
        font-size: 1.8em;
    }

    .board-list {
        display: flex;
        flex-direction: column;
        gap: 25px;
        margin-top: 20px;
    }

    /* Entire item box is now an anchor link button */
    .board-item {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed rgba(255, 255, 255, 0.15);
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, background 0.2s ease;
    }

    .board-item:hover {
        transform: scale(1.02);
        background: rgba(255, 255, 255, 0.08);
    }

    .wood-frame {
        width: 85px;
        height: 85px;
        border-radius: 6px;
        overflow: hidden;
        margin-right: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), 4px 4px 8px rgba(0,0,0,0.6);
        background-color: #222;
        flex-shrink: 0;
    }

    .wood-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .chalk-link {
        font-size: 1.9em;
        font-weight: bold;
        transition: all 0.2s ease;
    }

    /* ==========================================
       2. THEME 1: OLD PASTEL RAINBOW
       ========================================== */

        background: linear-gradient(45deg, #FFB3BA, #FFDFBA, #FFFFBA, #BAFFC9, #BAE1FF, #D0BAFF, #FFB3BA);
        background-size: 400% 400%;
        animation: rainbowFade 16s ease infinite;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        color: rgba(245, 245, 245, 0.95);
    }
    @keyframes rainbowFade {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .theme-pastel .menu-container, .theme-pastel .back-nav-btn {
        background: #2b3a32;
        border: 4px solid #5c2c16;
        color: #ffe699;
    }
