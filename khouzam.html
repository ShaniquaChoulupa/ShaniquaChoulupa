<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Creative Chalkboard Studio - Khouzam</title>
<style>
    /* Animated Pastel Rainbow Background */
    body {
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(45deg, #FFB3BA, #FFDFBA, #FFFFBA, #BAFFC9, #BAE1FF, #D0BAFF, #FFB3BA);
        background-size: 400% 400%;
        animation: rainbowFade 16s ease infinite;
        font-family: 'Comic Sans MS', cursive, sans-serif;
        box-sizing: border-box;
    }

    @keyframes rainbowFade {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Container for all chalkboards */
    .studio-wall {
        width: 100%;
        max-width: 750px;
        display: flex;
        flex-direction: column;
        gap: 40px; 
    }

    /* Top Action Control Toolbar Alignment System */
    .controls-wrapper {
        width: 100%;
        max-width: 750px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        gap: 15px;
    }

    /* Wood Framed Back Button */
    .back-nav-btn {
        background: #2b3a32;
        padding: 8px 20px;
        border: 6px solid #5c2c16;
        border-image: repeating-linear-gradient(45deg, #4a2210, #6a351c 10px, #4a2210 20px) 6 stretch;
        border-radius: 6px;
        box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        color: #ffe699;
        text-decoration: none;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        transition: transform 0.2s ease;
    }
    .back-nav-btn:hover {
        transform: scale(1.05);
    }

    /* Wood Framed Language Picker */
    .lang-menu-container {
        background: #2b3a32;
        padding: 8px 15px;
        border: 6px solid #5c2c16;
        border-image: repeating-linear-gradient(45deg, #4a2210, #6a351c 10px, #4a2210 20px) 6 stretch;
        border-radius: 6px;
        box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .lang-label {
        color: #ffe699;
        font-weight: bold;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    }

    .lang-select {
        background: #333;
        color: #fff;
        border: 2px dashed rgba(255,255,255,0.3);
        padding: 5px;
        border-radius: 4px;
        font-family: inherit;
        font-size: 1em;
        cursor: pointer;
        outline: none;
    }

    /* Ultra-Realistic Chalkboard and Wood Grain Frame */
    .chalkboard {
        background: radial-gradient(circle at 50% 30%, rgba(55, 75, 65, 0.9), rgba(35, 45, 40, 0.95)),
                    repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 10px);
        background-color: #2b3a32; 
        
        border: 22px solid #5c2c16;
        border-image: repeating-linear-gradient(0deg, #5c2c16, #4a2210 20px, #6a351c 40px, #4a2210 60px) 22 stretch;
        
        border-radius: 12px;
        color: rgba(245, 245, 245, 0.95); 
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6), 0 0 4px rgba(255, 255, 255, 0.2); 
        padding: 30px;
        box-shadow: 
            inset 0px 0px 20px rgba(0,0,0,0.7), 
            12px 15px 25px rgba(0, 0, 0, 0.4); 
        position: relative;
    }

    .chalkboard::before {
        content: '';
        position: absolute;
        top: -15px; left: -15px; right: -15px; bottom: -15px;
        border: 2px solid rgba(0,0,0,0.15);
        pointer-events: none;
    }

    h1, h2 {
        text-align: center;
        margin-top: 0;
        letter-spacing: 1px;
    }
    
    h1 { color: #fff; font-size: 2.2em; }
    h2 { color: #ffe699; font-size: 1.8em; } 

    p {
        font-size: 1.2em;
        line-height: 1.6;
        text-align: center;
    }

    .board-list {
        display: flex;
        flex-direction: column;
        gap: 25px;
        margin-top: 20px;
    }

    .board-item {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.04);
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed rgba(255, 255, 255, 0.15);
        transition: transform 0.2s ease, background 0.2s ease;
    }

    .board-item:hover {
        transform: scale(1.02);
        background: rgba(255, 255, 255, 0.08);
    }

    .wood-frame {
        width: 85px;
        height: 85px;
        border: 8px solid #5c2c16;
        border-image: repeating-linear-gradient(45deg, #4a2210, #6a351c 15px, #4a2210 30px) 8 stretch;
        border-radius: 6px;
        overflow: hidden;
        margin-right: 25px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), 4px 4px 8px rgba(0,0,0,0.6);
        background-color: #222;
        flex-shrink: 0;
    }

    .wood-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .chalk-link {
        font-size: 1.9em;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.2s ease;
    }

    .tt-link { color: #b3ffec; text-shadow: 0 0 5px rgba(179,255,236,0.4); }

    .chalk-link:hover {
        color: #fff !important;
        text-shadow: 0 0 10px rgba(255,255,255,0.8) !important;
    }
</style>
</head>
<body>

    <!-- Toolbar with Back Nav and Language Picker -->
    <div class="controls-wrapper">
        <a href="gallery.html" class="back-nav-btn" id="back-btn">← Back</a>

        <div class="lang-menu-container">
            <span class="lang-label" id="lang-label">Language:</span>
            <select class="lang-select" id="language-picker" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="at">Österreichisch (Standard Austrian)</option>
                <option value="noe">Niederösterreichisch (Dialect)</option>
                <option value="es">Español</option>
            </select>
        </div>
    </div>

    <div class="studio-wall">

        <!-- Social Media Chalkboard Base -->
        <div class="chalkboard" id="socials-chalkboard">
            <h2 id="socials-title">Follow Khouzam!</h2>
            <div class="board-list">

                <div class="board-item">
                    <div class="wood-frame">
                        <!-- Pulls directly from repository asset root -->
                        <img src="khouzam.png" alt="Khouzam Profile Image">
                    </div>
                    <a href="https://www.tiktok.com/@khouzam85" class="chalk-link tt-link" target="_blank">TikTok</a>
                </div>

            </div>
        </div>

    </div>

    <script>
        const translations = {
            en: {
                backBtn: "← Back",
                langLabel: "Language:",
                socialsTitle: "Follow Khouzam!"
            },
            at: {
                backBtn: "← Zurück",
                langLabel: "Sprache:",
                socialsTitle: "Folge Khouzam!"
            },
            noe: {
                backBtn: "← Zruck",
                langLabel: "Sproch:",
                socialsTitle: "Schau vorbei beim Khouzam!"
            },
            es: {
                backBtn: "← Volver",
                langLabel: "Idioma:",
                socialsTitle: "¡Sigue a Khouzam!"
            }
        };

        function changeLanguage(lang) {
            const set = translations[lang] || translations['en'];
            
            document.getElementById('back-btn').innerText = set.backBtn;
            document.getElementById('lang-label').innerText = set.langLabel;
            document.getElementById('socials-title').innerText = set.socialsTitle;
        }
    </script>
</body>
</html>
